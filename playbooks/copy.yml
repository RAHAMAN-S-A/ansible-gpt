---
- name: Copy Module Practice
  hosts: web
  become: yes

  tasks:

    - name: Copy HTML file
      ansible.builtin.copy:
        src: ../files/index.html
        dest: /usr/share/nginx/html/index.html
        owner: root
        group: root
        mode: '0644'

    - name: Copy information file
      ansible.builtin.copy:
        src: ../files/info.txt
        dest: /opt/info.txt
        owner: ec2-user
        group: ec2-user
        mode: '0644'